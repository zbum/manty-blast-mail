apiVersion: v1
kind: Secret
metadata:
  name: manty-blast-mail-config
  namespace: manty-blast-mail
type: Opaque
stringData:
  config.yaml: |
    server:
      port: 8080
      session_secret: "CHANGE_ME_IN_PRODUCTION_32_BYTES!"

    database:
      host: "your-db-host"
      port: 3306
      user: "your-db-user"
      password: "your-db-password"
      name: "mail_sender"

    smtp:
      host: "smtp.example.com"
      port: 465
      username: "user@example.com"
      password: "your-smtp-password"
      pool_size: 10

    sender:
      default_rate_limit: 10
      max_rate_limit: 100
      worker_count: 5
      batch_size: 100
